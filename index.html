<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Realidade Aumentada...</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding-top: 100px;
            margin: 0;
        }
        .loader {
            border: 4px solid #1a1a1a;
            border-top: 4px solid #d4af37;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #d4af37; font-size: 20px; font-weight: 500; }
        p { color: #888; font-size: 14px; }
        /* Deixa o link do iOS invisível, mas presente para o Safari validar */
        #ios-link { text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h2>Abrindo tamanho real (1:1)...</h2>
    <p>Ajustando a câmera do seu celular.</p>

    <a id="ios-link" rel="ar" href="https://github.com/Will3DMonkey/modelos3dm/raw/refs/heads/main/Cocoa%20form%20tamanhos%20personalizados.usdz">
        <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1' height='1'></svg>" style="display:none;">
    </a>

    <script>
        window.onload = function() {
            // Detecta se é iOS
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

            // Pequeno delay de 200ms para o Safari renderizar o elemento e aceitar o clique
            setTimeout(function() {
                if (isIOS) {
                    // Simula o clique exato que o Safari exige com a tag rel="ar"
                    document.getElementById('ios-link').click();
                } else {
                    // Dispara o motor nativo do Android direto
                    window.location.href = "https://arvr.google.com/scene-viewer/1.0?file=https://raw.githubusercontent.com/Will3DMonkey/modelos3dm/main/Cocoa%20form%20tamanhos%20personalizados.glb&mode=ar_only&resizable=false";
                }
            }, 200);
        };
    </script>

</body>
</html>
